name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-15
    env:
      ACCENTLY_VERSION: ${{ github.ref_name }}
      ACCENTLY_BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize version
        run: echo "ACCENTLY_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        if: ${{ secrets.APPLE_SIGNING_CERT_BASE64 != '' && secrets.APPLE_SIGNING_CERT_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' }}
        env:
          APPLE_SIGNING_CERT_BASE64: ${{ secrets.APPLE_SIGNING_CERT_BASE64 }}
          APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/accently-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/accently-signing.p12"
          echo "$APPLE_SIGNING_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_SIGNING_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"

      - name: Package app
        env:
          ACCENTLY_SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: ./scripts/package-app.sh

      - name: Notarize app
        if: ${{ secrets.APPLE_NOTARY_KEY_BASE64 != '' && secrets.APPLE_NOTARY_KEY_ID != '' }}
        env:
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          echo "$APPLE_NOTARY_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          if [[ -n "$APPLE_NOTARY_ISSUER_ID" ]]; then
            xcrun notarytool submit "dist/Accently-${ACCENTLY_VERSION}-macos.zip" \
              --key "$KEY_PATH" \
              --key-id "$APPLE_NOTARY_KEY_ID" \
              --issuer "$APPLE_NOTARY_ISSUER_ID" \
              --wait
          else
            xcrun notarytool submit "dist/Accently-${ACCENTLY_VERSION}-macos.zip" \
              --key "$KEY_PATH" \
              --key-id "$APPLE_NOTARY_KEY_ID" \
              --wait
          fi
          xcrun stapler staple "dist/Accently.app"
          ditto -c -k --keepParent "dist/Accently.app" "dist/Accently-${ACCENTLY_VERSION}-macos.zip"

      - name: Create checksum
        run: shasum -a 256 "dist/Accently-${ACCENTLY_VERSION}-macos.zip" > "dist/Accently-${ACCENTLY_VERSION}-macos.zip.sha256"

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          TAG="$GITHUB_REF_NAME"
          TITLE="Accently ${ACCENTLY_VERSION}"
          ZIP="dist/Accently-${ACCENTLY_VERSION}-macos.zip"
          SUM="dist/Accently-${ACCENTLY_VERSION}-macos.zip.sha256"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP" "$SUM" --clobber
          else
            gh release create "$TAG" "$ZIP" "$SUM" \
              --title "$TITLE" \
              --generate-notes
          fi
